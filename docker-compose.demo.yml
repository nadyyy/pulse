services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - demo_postgres:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://myapp:myapp@db:5432/myapp?schema=public
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  demo_postgres:
